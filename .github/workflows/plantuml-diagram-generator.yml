name: Generate PlantUML Diagrams

on:
  push:
    paths:
      - 'specs/model/*.puml'
  pull_request:
    paths:
      - 'specs/model/*.puml'

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download PlantUML
      run: |
        wget https://github.com/plantuml/plantuml/releases/download/v1.2024.4/plantuml-1.2024.4.jar -O plantuml.jar

    - name: Generate diagrams
      run: |
        mkdir -p specs/model/output
        for file in specs/model/*.puml; do
          java -jar plantuml.jar -tpng "$file" -o specs/model/output
        done

    - name: Upload diagrams
      uses: actions/upload-artifact@v4
      with:
        name: plantuml-diagrams
        path: specs/model/output
