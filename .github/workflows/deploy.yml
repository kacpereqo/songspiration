name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 1. Przywracanie wszystkich zależności NuGet
      - name: Restore dependencies
        run: dotnet restore backend/SongSpiration.API/SongSpiration.API.csproj

      # 2. Budowanie gotowej paczki (linux-x64) bezpośrednio na GitHubie
      - name: dotnet publish
        run: |
          dotnet publish backend/SongSpiration.API/SongSpiration.API.csproj \
            -c Release \
            -o publish \
            -r linux-x64 \
            --self-contained false \
            --no-restore

      # 3. Kopiowanie bazy danych do folderu publikacji
      - name: Copy Database
        run: |
          if [ -f "backend/SongSpiration.API/SongSpiration.db" ]; then
            cp backend/SongSpiration.API/SongSpiration.db publish/
          else
            echo "Warning: SongSpiration.db not found!"
          fi

      # 4. Pakowanie TYLKO Dockerfile i gotowego folderu publish
      - name: Generate Deployment Package
        run: zip -r deploy.zip Dockerfile publish/

      # 5. Wysyłka do AWS Elastic Beanstalk
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: 'songspiration'
          environment_name: 'Songspiration-env'
          version_label: "ver-${{ github.sha }}"
          region: us-east-1
          deployment_package: deploy.zip
