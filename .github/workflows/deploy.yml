name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # Kluczowa zmiana: Pakujemy tylko to, co niezbędne, 
      # zachowując strukturę folderu 'backend' i plik Dockerfile w głównym katalogu
      - name: Generate Deployment Package
        run: |
          zip -r deploy.zip Dockerfile backend/ -x "**/bin/*" "**/obj/*" "backend/SongSpiration.API/wwwroot/uploads/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: 'songspiration'
          environment_name: 'Songspiration-env'
          version_label: "ver-${{ github.sha }}"
          region: us-east-1
          deployment_package: deploy.zip
