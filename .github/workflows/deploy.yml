name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 1. Restore na pliku solucji w root (to pobierze AutoMappera dla BLL)
      - name: Restore dependencies
        run: dotnet restore songspiration.sln -r linux-x64

# Uproszczony krok publish (jeśli Plan A zawiedzie)
      - name: dotnet publish
        run: |
          dotnet publish backend/SongSpiration.API/SongSpiration.API.csproj \
            -c Release \
            -o publish \
            -r linux-x64 \
            --self-contained false

      # 3. Kopiowanie bazy danych (poprawiona ścieżka)
      - name: Copy Database
        run: |
          if [ -f "backend/SongSpiration.API/SongSpiration.db" ]; then
            cp backend/SongSpiration.API/SongSpiration.db publish/
          fi

      # 4. Przygotowanie paczki dla Elastic Beanstalk
      # Kopiujemy Dockerfile do środka folderu publish, żeby Docker widział pliki DLL obok siebie
      - name: Generate Deployment Package
        run: |
          cp Dockerfile publish/
          cd publish
          zip -r ../deploy.zip .

      # 5. Wysyłka do AWS
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: 'songspiration'
          environment_name: 'Songspiration-env'
          version_label: "ver-${{ github.sha }}"
          region: us-east-1
          deployment_package: deploy.zip
